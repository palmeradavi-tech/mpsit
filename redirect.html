<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirection vers Brave</title>
    <script>
        // Récupère les paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        // Récupère les cookies, utilisateur et mot de passe
        const cookies = urlParams.get('cookies');
        const user = urlParams.get('user');
        const pass = urlParams.get('pass');

        // Redirige vers Brave avec les paramètres
        window.location.href = "https://brave.com/?cookies=" + encodeURIComponent(cookies) + "&user=" + encodeURIComponent(user) + "&pass=" + encodeURIComponent(pass);
    </script>
</head>
<body>
    <p>Redirection en cours...</p>
</body>
</html>
